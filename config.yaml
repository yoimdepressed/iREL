paths:
  audio_dir: "data/audio"
  transcripts_dir: "data/transcripts"
  graphs_dir: "data/outputs/graphs"
  json_dir: "data/outputs/json"

whisper:
  model_size: "medium"
  language: null # null = auto-detect (best for code-mixed)

groq:
  model: "llama-3.3-70b-versatile"
  temperature: 0.2

extraction:
  top_n_concepts: 20 # max concepts to extract per video
  min_keyword_score: 0.15 # keybert score threshold

prerequisites:
  nli_weight: 0.7 # weight for NLI score in final confidence
  positional_weight: 0.3 # weight for positional score
  min_confidence: 0.5 # edges below this get filtered out
  positional_gap: 120 # seconds gap needed for positional signal
